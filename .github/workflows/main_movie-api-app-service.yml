# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: 'Build and deploy ASP.NET Core app to Azure Web App: movietest'

on:
  push:
    branches:
    - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      SOLUTION_PATH: movie-api-app-service.sln
      WEBAPP_NAME: movietest
      PROJECT_PATH: movie-api-app-service/movie-api-app-service.csproj
      TEST_PROJECT_PATH: tests/movie-api-app-service.Tests/movie-api-app-service.Tests.csproj
      PUBLISH_DIR: ${{ github.workspace }}/publish
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore ${{ env.SOLUTION_PATH }}

    - name: Build with dotnet
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

    - name: Test with dotnet
      run: dotnet test ${{ env.TEST_PROJECT_PATH }} --configuration Release --no-build --logger "console;verbosity=normal"
    
    - name: dotnet publish
      run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -o ${{ env.PUBLISH_DIR }} --no-build

    - name: Verify publish output
      run: |
        test -f "${{ env.PUBLISH_DIR }}/movie-api-app-service.dll"
        ls -la "${{ env.PUBLISH_DIR }}"

    - name: Login to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3FFA5D1549BF4B409573513D31DD902F }}
        tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7C76093AB437468690E0A1A060D5E32B }}
        subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_76DF915120B24E3397662FE44568F749 }}

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with: 
        app-name: ${{ env.WEBAPP_NAME }}
        package: ${{ env.PUBLISH_DIR }}
